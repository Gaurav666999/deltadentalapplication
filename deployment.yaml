apiVersion: apps/v1
kind: Deployment
metadata:
  name: ui-task-v4  # Unique Name
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ui-task-v4
  template:
    metadata:
      labels:
        app: ui-task-v4
    spec:
      containers:
      - name: ui-task
        image: devtodoacrwestus.azurecr.io/todo-ui:v4
        env:
          - name: CONNECTION_STRING
            value: "Driver={ODBC Driver 17 for SQL Server};Server=tcp:devtododbsrvwuswus1.database.windows.net,1433;Database=todoappdb;Uid=devopsadmin;Pwd=P@ssw01rd@123;Encrypt=yes;TrustServerCertificate=no;Connection Timeout=30;"
        ports:
        - containerPort: 80 # Changed from 8000 to 80 to match Nginx

---

